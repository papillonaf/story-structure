<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CHTFQ51S8P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CHTFQ51S8P');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故事結構理論對照工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>故事結構理論對照</h1>
      <span class="header-tagline">Comparative Story Structure Framework</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;">
      <div class="view-switcher">
        <button class="view-btn active" data-view="timeline">時間軸</button>
        <button class="view-btn" data-view="circle">環形圖</button>
        <button class="view-btn" data-view="table">表格</button>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut" title="縮小字體">A−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" id="zoomIn" title="放大字體">A+</button>
      </div>
    </div>
  </div>

  <div class="mode-switcher" id="modeSwitcher">
    <button class="mode-btn" data-mode="film">
      <span class="mode-icon">🎬</span>
      <div class="mode-text">
        <span class="mode-main">從作品開始</span>
        <span class="mode-sub">選一部電影，看它如何被拆解</span>
      </div>
    </button>
    <button class="mode-btn" data-mode="theory">
      <span class="mode-icon">📐</span>
      <div class="mode-text">
        <span class="mode-main">從理論開始</span>
        <span class="mode-sub">並列比較所有故事結構理論</span>
      </div>
    </button>
  </div>

  <div class="film-bar" id="filmBar"></div>
  <div class="legend-bar" id="legend"></div>
  <div class="case-bar" id="caseBar"></div>

  <div class="main-content">
    <div class="view active" id="view-timeline">
      <div class="timeline-wrapper">
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="view" id="view-circle">
      <div class="circle-view-inner">
        <div class="circle-theory-selector" id="circleSelector"></div>
        <div class="circle-container">
          <svg class="circle-svg" id="circleSvg" viewBox="-100 -100 900 900"></svg>
        </div>
      </div>
    </div>

    <div class="view" id="view-table">
      <div class="table-wrapper">
        <table class="struct-table" id="structTable"></table>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <strong>核心觀念：</strong>所有結構理論都在描述同一件事——主角離開日常、面對衝突、經歷轉變後回到新的平衡。差異只在切分的精細度和觀看的角度。
    <span style="float:right;"><a href="mailto:by.chiaan.wang@protonmail.com" style="color:var(--text-dim);text-decoration:none;border-bottom:1px dotted var(--text-dim);transition:color 0.2s" onmouseover="this.style.color='var(--accent4)'" onmouseout="this.style.color='var(--text-dim)'">聯繫作者 ✉</a></span>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-theory" id="tooltipTheory"></div>
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div class="tooltip-desc" id="tooltipDesc"></div>
  <div class="tooltip-position" id="tooltipPos"></div>
</div>

<!-- Info Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="modal-author" id="modalAuthor"></div>
    <div class="modal-source" id="modalSource"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
