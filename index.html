<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故事結構理論對照工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --scale: 1;
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1a1a24;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --accent1: #ff6b6b;
  --accent2: #ffd93d;
  --accent3: #6bcb77;
  --accent4: #4d96ff;
  --accent5: #c084fc;
  --accent6: #fb923c;
  --accent7: #22d3ee;
  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Compact header for projection */
.header {
  text-align: center;
  padding: 12px 24px 10px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h1 {
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--text);
  white-space: nowrap;
}

.header-tagline {
  color: var(--text-dim);
  font-size: 0.75rem;
  font-weight: 300;
}

/* View Switcher in header */
.view-switcher {
  display: flex;
  gap: 6px;
}

.view-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 99px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  transition: all 0.25s ease;
}

.view-btn:hover { border-color: var(--accent4); color: var(--text); }
.view-btn.active { background: var(--accent4); border-color: var(--accent4); color: #000; font-weight: 700; }

/* Zoom controls */
.zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  border-left: 1px solid var(--border);
  padding-left: 12px;
}

.zoom-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 30px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.zoom-btn:hover { border-color: var(--accent4); color: var(--text); }

.zoom-level {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-dim);
  min-width: 36px;
  text-align: center;
}

/* Legend bar */
.legend-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.68rem;
  color: var(--text-dim);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 99px;
  border: 1px solid transparent;
  transition: all 0.25s ease;
  user-select: none;
}

.legend-item:hover { border-color: var(--border); }
.legend-item.dimmed { opacity: 0.25; }
.legend-item .info-btn {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.55rem; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; margin-left: 2px; transition: all 0.2s;
}
.legend-item .info-btn:hover { background: var(--accent4); color: #000; border-color: var(--accent4); }

.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Case selector */
.case-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 24px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.case-bar-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--text-dim);
  margin-right: 4px;
  white-space: nowrap;
}

.case-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.68rem;
  color: var(--text-dim);
  cursor: pointer;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.25s ease;
  user-select: none;
}

.case-btn:hover { border-color: var(--accent4); color: var(--text); }
.case-btn.active { background: rgba(255,255,255,0.08); border-color: var(--text-dim); color: var(--text); }

.case-btn .case-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

.case-info-btn {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 0.55rem; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; margin-left: 2px; transition: all 0.2s;
}
.case-info-btn:hover { background: var(--accent4); color: #000; border-color: var(--accent4); }

/* Case timeline rows */
.timeline-case-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 0 4px 140px;
  opacity: 0.5;
}

.timeline-case-header {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--text-dim);
  padding: 2px 0 2px 140px;
  letter-spacing: 0.05em;
}

.timeline-segment.case-segment {
  border: 1px solid rgba(255,255,255,0.15);
  background-image: repeating-linear-gradient(
    135deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.15) 3px,
    rgba(0,0,0,0.15) 5px
  );
}

/* Main content area - fills remaining space */
.main-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.view { display: none; height: 100%; }
.view.active { display: flex; flex-direction: column; }

/* ===== TIMELINE VIEW ===== */
.timeline-wrapper {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
  padding: 12px 24px;
  -webkit-overflow-scrolling: touch;
}

.timeline { min-width: 900px; }

.timeline-axis {
  position: relative;
  height: 24px;
  margin-bottom: 2px;
}

.timeline-axis-line {
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: var(--border);
}

.timeline-axis-label {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  background: var(--bg);
  padding: 1px 4px;
}

.timeline-row {
  display: flex;
  align-items: center;
  margin-bottom: 2px;
}

.timeline-label {
  width: 140px;
  flex-shrink: 0;
  font-size: 0.68rem;
  font-weight: 700;
  text-align: right;
  padding-right: 12px;
}

.timeline-track {
  flex: 1;
  position: relative;
  height: 28px;
  display: flex;
}

.timeline-segment {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.58rem;
  font-weight: 600;
  color: #000;
  border-right: 1px solid rgba(0,0,0,0.12);
  cursor: pointer;
  transition: all 0.2s ease;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 3px;
  position: relative;
}

.timeline-segment:hover {
  z-index: 10;
  transform: scaleY(1.35);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}

.timeline-segment:first-child { border-radius: 5px 0 0 5px; }
.timeline-segment:last-child { border-radius: 0 5px 5px 0; border-right: none; }

.act-header {
  text-align: center;
  font-size: 0.6rem;
  font-weight: 700;
  line-height: 28px;
}

/* ===== CIRCLE VIEW ===== */
.circle-view-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.circle-theory-selector {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
  flex-shrink: 0;
}

.circle-theory-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 99px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.72rem;
  transition: all 0.25s ease;
}

.circle-theory-btn:hover { border-color: var(--accent4); color: var(--text); }
.circle-theory-btn.active { color: #000; font-weight: 700; }

.circle-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 20px;
  overflow: hidden;
}

.circle-svg { max-height: 100%; max-width: 720px; width: 100%; }

/* ===== TABLE VIEW ===== */
.table-wrapper {
  flex: 1;
  overflow: auto;
  padding: 0 12px 12px;
  -webkit-overflow-scrolling: touch;
}

.struct-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 860px;
  font-size: 0.68rem;
}

.struct-table th {
  background: var(--surface);
  padding: 8px 8px;
  font-size: 0.68rem;
  font-weight: 700;
  text-align: left;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
}

.struct-table th:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--surface);
}

.struct-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  color: var(--text-dim);
  line-height: 1.4;
}

.struct-table td:first-child {
  position: sticky;
  left: 0;
  background: var(--bg);
  font-weight: 700;
  color: var(--text);
  min-width: 110px;
  z-index: 1;
}

.struct-table tbody tr:hover td { background: var(--surface); }
.struct-table tbody tr:hover td:first-child { background: var(--surface2); }

.stage-label {
  display: inline-block;
  font-size: 0.58rem;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  margin-bottom: 2px;
}

/* Tooltip */
.tooltip {
  display: none;
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  max-width: 300px;
  z-index: 1000;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  pointer-events: none;
}

.tooltip.show { display: block; }
.tooltip-theory { font-size: 0.65rem; color: var(--accent4); margin-bottom: 4px; font-weight: 700; }
.tooltip-title { font-weight: 700; font-size: 0.82rem; margin-bottom: 4px; }
.tooltip-desc { font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }
.tooltip-position { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--accent4); margin-top: 5px; }

/* Info Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  justify-content: center;
  align-items: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 480px;
  width: 90%;
  max-height: 70vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none; border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
}

.modal-close:hover { color: var(--text); }

.modal h2 { font-size: 1.1rem; margin-bottom: 4px; }
.modal .modal-author { font-size: 0.8rem; color: var(--accent4); margin-bottom: 6px; }
.modal .modal-source { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 12px; font-style: italic; }
.modal .modal-body { font-size: 0.82rem; color: var(--text-dim); line-height: 1.7; }
.modal .modal-body strong { color: var(--text); }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  text-align: center;
  padding: 6px 24px;
  border-top: 1px solid var(--border);
  font-size: 0.68rem;
  color: var(--text-dim);
  font-weight: 300;
}

.bottom-bar strong { color: var(--text); font-weight: 700; }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  html, body { height: auto; overflow: auto; }
  .app { height: auto; min-height: 100vh; }
  
  .header { flex-direction: column; gap: 8px; padding: 10px 16px; }
  .header-left { flex-direction: column; align-items: flex-start; gap: 2px; }
  .header h1 { font-size: 1rem; }
  .header-tagline { font-size: 0.65rem; }
  .view-switcher { width: 100%; justify-content: center; }
  .view-btn { padding: 8px 16px; font-size: 0.8rem; }
  .zoom-controls { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 8px; justify-content: center; width: 100%; }
  
  .legend-bar { padding: 8px 12px; gap: 4px; }
  .legend-item { font-size: 0.65rem; padding: 4px 6px; }
  .case-bar { padding: 8px 12px; gap: 4px; }
  .case-btn { font-size: 0.65rem; padding: 4px 8px; }
  
  .main-content { overflow: auto; height: auto; }
  .view { height: auto !important; }
  .view.active { display: block !important; }
  
  /* Timeline scrolls horizontally */
  .timeline-wrapper { padding: 12px; }
  .timeline { min-width: 700px; }
  .timeline-label { width: 100px; font-size: 0.6rem; }
  .timeline-segment { font-size: 0.5rem; }
  
  /* Circle fills screen */
  .circle-container { padding: 8px; }
  .circle-svg { max-width: 100%; }
  .circle-theory-selector { gap: 4px; padding: 8px; }
  .circle-theory-btn { font-size: 0.7rem; padding: 6px 10px; }
  
  /* Table scrolls */
  .table-wrapper { padding: 0 8px 12px; }
  .struct-table { min-width: 700px; }
  
  /* Bottom bar wraps */
  .bottom-bar { padding: 10px 16px; font-size: 0.65rem; text-align: left; }
  .bottom-bar span { float: none !important; display: block; margin-top: 6px; }
  
  /* Modal */
  .modal { padding: 20px; max-height: 80vh; }
  
  /* Touch-friendly: make segments and arcs respond to tap */
  .timeline-segment { min-height: 36px; }
}

@media (max-width: 480px) {
  .header h1 { font-size: 0.9rem; }
  .view-btn { padding: 6px 12px; font-size: 0.72rem; }
  .legend-item { font-size: 0.6rem; }
  .timeline { min-width: 600px; }
  .timeline-label { width: 80px; font-size: 0.55rem; }
}
</style>
</head>

<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>故事結構理論對照</h1>
      <span class="header-tagline">Comparative Story Structure Framework</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;">
      <div class="view-switcher">
        <button class="view-btn active" onclick="switchView('timeline')">時間軸</button>
        <button class="view-btn" onclick="switchView('circle')">環形圖</button>
        <button class="view-btn" onclick="switchView('table')">表格</button>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-1)" title="縮小字體">A−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" onclick="changeZoom(1)" title="放大字體">A+</button>
      </div>
    </div>
  </div>

  <div class="legend-bar" id="legend"></div>
  <div class="case-bar" id="caseBar"></div>

  <div class="main-content">
    <div class="view active" id="view-timeline">
      <div class="timeline-wrapper">
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="view" id="view-circle">
      <div class="circle-view-inner">
        <div class="circle-theory-selector" id="circleSelector"></div>
        <div class="circle-container">
          <svg class="circle-svg" id="circleSvg" viewBox="-100 -100 900 900"></svg>
        </div>
      </div>
    </div>

    <div class="view" id="view-table">
      <div class="table-wrapper">
        <table class="struct-table" id="structTable"></table>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <strong>核心觀念：</strong>所有結構理論都在描述同一件事——主角離開日常、面對衝突、經歷轉變後回到新的平衡。差異只在切分的精細度和觀看的角度。

</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-theory" id="tooltipTheory"></div>
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div class="tooltip-desc" id="tooltipDesc"></div>
  <div class="tooltip-position" id="tooltipPos"></div>
</div>

<!-- Info Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="modal-author" id="modalAuthor"></div>
    <div class="modal-source" id="modalSource"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

let activeCases = new Set();

// Case bar
function buildCaseBar() {
  const el = document.getElementById('caseBar');
  let h = '<span class="case-bar-label">🎬 範例：</span>';
  cases.forEach(c => {
    const active = activeCases.has(c.id);
    h += `<button class="case-btn ${active ? 'active' : ''}" onclick="toggleCase('${c.id}')">`;
    h += `<span class="case-dot" style="background:${c.color};opacity:${active ? 1 : 0.4}"></span>`;
    h += `${c.title}`;
    h += `<span class="case-info-btn" onclick="event.stopPropagation();showCaseModal('${c.id}')">i</span>`;
    h += `</button>`;
  });
  el.innerHTML = h;
}

function toggleCase(id) {
  if (activeCases.has(id)) activeCases.delete(id);
  else activeCases.add(id);
  buildCaseBar();
  renderTimeline();
  renderTable();
  renderCircle();
}

function showCaseModal(id) {
  const c = cases.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = c.title + '（' + c.titleEn + '）';
  document.getElementById('modalAuthor').textContent = '導演：' + c.director + '　編劇：' + c.writer;
  document.getElementById('modalSource').textContent = c.year + '年' + (c.note ? '　' + c.note : '');
  document.getElementById('modalBody').innerHTML = '本範例使用 <strong>Syd Field</strong>、<strong>Save the Cat</strong> 和 <strong>Story Circle</strong> 三套理論拆解此片的故事結構。開啟後可在時間軸和表格中，對照理論預設節拍與本片的實際場景。';
  document.getElementById('modalOverlay').classList.add('show');
}

// Legend
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  theories.forEach(t => {
    const item = document.createElement('div');
    item.className = `legend-item ${activeTheories.has(t.id) ? '' : 'dimmed'}`;
    item.innerHTML = `<span class="legend-dot" style="background:${t.color}"></span><span onclick="toggleTheory('${t.id}')">${t.name}</span><span class="info-btn" onclick="event.stopPropagation();showModal('${t.id}')">i</span>`;
    item.onclick = () => toggleTheory(t.id);
    el.appendChild(item);
  });
}

function toggleTheory(id) {
  if (activeTheories.has(id)) { if (activeTheories.size > 1) activeTheories.delete(id); }
  else activeTheories.add(id);
  buildLegend(); renderTimeline(); renderTable();
}

// Modal
function showModal(id) {
  const t = theories.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = t.name;
  document.getElementById('modalAuthor').textContent = '提出者：' + t.author;
  document.getElementById('modalSource').textContent = '出處：' + t.source;
  document.getElementById('modalBody').innerHTML = t.spirit;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// Timeline
function renderTimeline() {
  const c = document.getElementById('timeline');
  const vis = theories.filter(t => activeTheories.has(t.id));
  let h = '';
  
  // Axis
  h += '<div class="timeline-axis"><div class="timeline-axis-line"></div>';
  [0, 25, 50, 75, 100].forEach(p => {
    h += `<div class="timeline-axis-label" style="left:calc(140px + ${p}% * (100% - 140px) / 100 - 12px)">${p}%</div>`;
  });
  h += '</div>';
  
  // Act labels
  h += '<div class="timeline-row"><div class="timeline-label" style="font-size:0.6rem;color:var(--text-dim)">故事進度 →</div><div class="timeline-track">';
  h += `<div class="act-header" style="width:25%;color:var(--accent1)">第一幕</div>`;
  h += `<div class="act-header" style="width:50%;color:var(--accent2);border-left:1px dashed var(--border);border-right:1px dashed var(--border)">第二幕</div>`;
  h += `<div class="act-header" style="width:25%;color:var(--accent3)">第三幕</div>`;
  h += '</div></div>';
  
  vis.forEach(theory => {
    h += `<div class="timeline-row"><div class="timeline-label" style="color:${theory.color}">${theory.name}</div><div class="timeline-track">`;
    theory.steps.forEach(step => {
      const w = step.end - step.start;
      const op = step.act === 1 ? 0.65 : step.act === 2 ? 0.8 : 0.95;
      h += `<div class="timeline-segment" style="width:${w}%;background:${theory.color};opacity:${op}" data-theory="${theory.name}" data-title="${step.name}" data-desc="${step.desc}" data-pos="${step.start}%–${step.end}%" onmouseenter="showTip(event,this)" onmouseleave="hideTip()" onmousemove="moveTip(event)">${w > 9 ? step.name.split(/[ ：]/)[0] : ''}</div>`;
    });
    h += '</div></div>';
  });

  // Case study rows
  cases.forEach(cs => {
    if (!activeCases.has(cs.id)) return;
    h += `<div class="timeline-case-divider"></div>`;
    h += `<div class="timeline-case-header">🎬 ${cs.title}（${cs.titleEn}, ${cs.year}）— 導演：${cs.director}　編劇：${cs.writer}</div>`;
    
    caseTheories.forEach(tid => {
      const theory = theories.find(t => t.id === tid);
      if (!theory) return;
      const steps = cs.analyses[tid];
      if (!steps) return;
      
      h += `<div class="timeline-row"><div class="timeline-label" style="color:${cs.color};font-size:0.62rem">${theory.name}</div><div class="timeline-track">`;
      const totalSteps = steps.length;
      steps.forEach((step, sIdx) => {
        const w = step.end - step.start;
        const op = 0.35 + (sIdx / (totalSteps - 1)) * 0.55;
        const escapedDesc = step.desc.replace(/"/g, '&quot;');
        const escapedName = step.name.replace(/"/g, '&quot;');
        h += `<div class="timeline-segment case-segment" style="width:${w}%;background:${cs.color};opacity:${op}" data-theory="${cs.title} × ${theory.name}" data-title="${escapedName}" data-desc="${escapedDesc}" data-pos="${step.start}%–${step.end}%" onmouseenter="showTip(event,this)" onmouseleave="hideTip()" onmousemove="moveTip(event)">${w > 9 ? step.name.split(/[ ：]/)[0] : ''}</div>`;
      });
      h += '</div></div>';
    });
  });

  c.innerHTML = h;
}

// Circle
function renderCircleSelector() {
  const c = document.getElementById('circleSelector');
  c.innerHTML = '';
  theories.forEach(t => {
    const b = document.createElement('button');
    b.className = `circle-theory-btn ${t.id === currentCircleTheory ? 'active' : ''}`;
    if (t.id === currentCircleTheory) b.style.background = t.color;
    b.textContent = t.name;
    b.onclick = () => { currentCircleTheory = t.id; renderCircleSelector(); renderCircle(); };
    c.appendChild(b);
  });
}

function renderCircle() {
  const svg = document.getElementById('circleSvg');
  const theory = theories.find(t => t.id === currentCircleTheory);
  const cx = 350, cy = 350, r = 230;
  let h = '';
  
  // Zoom scale factor for SVG text
  const zoomScale = ZOOM_STEPS[zoomIndex] / 100;
  const fs = (base) => (base * zoomScale).toFixed(1);
  
  // Check which cases are active and have data for current theory
  const activeCaseList = cases.filter(cs => activeCases.has(cs.id) && cs.analyses[currentCircleTheory]);
  
  h += `<circle cx="${cx}" cy="${cy}" r="${r+25}" fill="none" stroke="${theory.color}" stroke-opacity="0.08" stroke-width="1"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${theory.color}" stroke-opacity="0.2" stroke-width="2"/>`;
  h += `<text x="${cx}" y="${cy-20}" text-anchor="middle" fill="${theory.color}" font-size="${fs(26)}" font-weight="900" font-family="Noto Sans TC">${theory.name}</text>`;
  h += `<text x="${cx}" y="${cy+8}" text-anchor="middle" fill="#8888a0" font-size="${fs(15)}" font-family="Noto Sans TC">${theory.steps.length} 個階段</text>`;
  h += `<text x="${cx}" y="${cy+30}" text-anchor="middle" fill="#999" font-size="${fs(12)}" font-family="Noto Sans TC" font-weight="300">${theory.author}</text>`;
  
  // Show active case names in center
  if (activeCaseList.length > 0) {
    activeCaseList.forEach((cs, ci) => {
      h += `<text x="${cx}" y="${cy+50+ci*20}" text-anchor="middle" fill="${cs.color}" font-size="${fs(12)}" font-family="Noto Sans TC" font-weight="500">🎬 ${cs.title}（${cs.year}）</text>`;
    });
  } else if (activeCases.size > 0 && !caseTheories.includes(currentCircleTheory)) {
    h += `<text x="${cx}" y="${cy+52}" text-anchor="middle" fill="#8888a0" font-size="${fs(11)}" font-family="Noto Sans TC" font-style="italic">案例僅支援 Syd Field / Save the Cat / Story Circle</text>`;
  }
  
  theory.steps.forEach((step, i) => {
    const sa = (step.start / 100) * Math.PI * 2 - Math.PI / 2;
    const ea = (step.end / 100) * Math.PI * 2 - Math.PI / 2;
    const ma = ((step.start + step.end) / 2 / 100) * Math.PI * 2 - Math.PI / 2;
    const x1 = cx + r * Math.cos(sa), y1 = cy + r * Math.sin(sa);
    const x2 = cx + r * Math.cos(ea), y2 = cy + r * Math.sin(ea);
    const la = (step.end - step.start) > 50 ? 1 : 0;
    const op = step.act === 1 ? 0.2 : step.act === 2 ? 0.28 : 0.35;
    
    const escapedName = step.name.replace(/'/g, "\\'");
    const escapedDesc = step.desc.replace(/'/g, "\\'");
    
    h += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2} Z" fill="${theory.color}" fill-opacity="${op}" stroke="${theory.color}" stroke-opacity="0.35" stroke-width="1" style="cursor:pointer" onmouseenter="showTip(event,null,'${theory.name}','${escapedName}','${escapedDesc}','${step.start}%–${step.end}%')" onmouseleave="hideTip()" onmousemove="moveTip(event)"/>`;
    
    const dr = r - 40;
    const dx = cx + dr * Math.cos(ma), dy = cy + dr * Math.sin(ma);
    h += `<circle cx="${dx}" cy="${dy}" r="${18*zoomScale}" fill="${theory.color}" fill-opacity="0.3"/>`;
    h += `<text x="${dx}" y="${dy+5}" text-anchor="middle" fill="${theory.color}" font-size="${fs(15)}" font-weight="700" font-family="Space Mono">${i + 1}</text>`;
    
    const or2 = r + 55 + activeCaseList.length * 28;
    const ox = cx + or2 * Math.cos(ma), oy = cy + or2 * Math.sin(ma);
    const mdeg = ma * 180 / Math.PI;
    const anc = Math.abs(mdeg) > 90 ? 'end' : 'start';
    const sn = step.name.length > 22 ? step.name.substring(0, 22) + '…' : step.name;
    h += `<text x="${ox}" y="${oy+5}" text-anchor="${anc}" fill="var(--text)" font-size="${fs(14)}" font-family="Noto Sans TC" font-weight="600">${sn}</text>`;
  });
  
  // Helper: hue-based color progression (light to dark)
  function hueShift(hexColor, stepIndex, totalSteps) {
    const rr = parseInt(hexColor.slice(1,3), 16) / 255;
    const gg = parseInt(hexColor.slice(3,5), 16) / 255;
    const bb = parseInt(hexColor.slice(5,7), 16) / 255;
    const max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb);
    let hh = 0, ss = 0, ll = (max + min) / 2;
    if (max !== min) {
      const d = max - min;
      ss = ll > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === rr) hh = ((gg - bb) / d + (gg < bb ? 6 : 0)) / 6;
      else if (max === gg) hh = ((bb - rr) / d + 2) / 6;
      else hh = ((rr - gg) / d + 4) / 6;
    }
    const progress = totalSteps <= 1 ? 0.5 : stepIndex / (totalSteps - 1);
    const newL = 0.72 - progress * 0.38;
    const newS = Math.min(ss + 0.1, 1.0);
    return `hsl(${Math.round(hh*360)}, ${Math.round(newS*100)}%, ${Math.round(newL*100)}%)`;
  }
  
  // Case study outer arcs
  activeCaseList.forEach((cs, cIdx) => {
    const caseSteps = cs.analyses[currentCircleTheory];
    if (!caseSteps) return;
    
    const arcR = r + 70 + cIdx * 28;
    const arcW = 22;
    const totalSteps = caseSteps.length;
    
    caseSteps.forEach((step, sIdx) => {
      const sa = (step.start / 100) * Math.PI * 2 - Math.PI / 2;
      const ea = (step.end / 100) * Math.PI * 2 - Math.PI / 2;
      const la = (step.end - step.start) > 50 ? 1 : 0;
      
      const innerR = arcR - arcW / 2;
      const outerR = arcR + arcW / 2;
      
      const ix1 = cx + innerR * Math.cos(sa), iy1 = cy + innerR * Math.sin(sa);
      const ix2 = cx + innerR * Math.cos(ea), iy2 = cy + innerR * Math.sin(ea);
      const ox1 = cx + outerR * Math.cos(sa), oy1 = cy + outerR * Math.sin(sa);
      const ox2 = cx + outerR * Math.cos(ea), oy2 = cy + outerR * Math.sin(ea);
      
      const fillColor = hueShift(cs.color, sIdx, totalSteps);
      
      const escapedName = step.name.replace(/'/g, "\\'");
      const escapedDesc = step.desc.replace(/'/g, "\\'");
      
      h += `<path d="M ${ix1} ${iy1} A ${innerR} ${innerR} 0 ${la} 1 ${ix2} ${iy2} L ${ox2} ${oy2} A ${outerR} ${outerR} 0 ${la} 0 ${ox1} ${oy1} Z" fill="${fillColor}" stroke="${cs.color}" stroke-opacity="0.3" stroke-width="0.5" style="cursor:pointer" onmouseenter="showTip(event,null,'${cs.title.replace(/'/g, "\\'")} × ${theory.name}','${escapedName}','${escapedDesc}','${step.start}%–${step.end}%')" onmouseleave="hideTip()" onmousemove="moveTip(event)"/>`;
    });
    
    // Case title label
    const labelAngle = -Math.PI / 2 - 0.12;
    const labelX = cx + (arcR + 16) * Math.cos(labelAngle);
    const labelY = cy + (arcR + 16) * Math.sin(labelAngle);
    h += `<text x="${labelX}" y="${labelY}" text-anchor="middle" fill="${cs.color}" font-size="${fs(13)}" font-weight="700" font-family="Noto Sans TC" opacity="0.9">${cs.title}</text>`;
  });
  
  svg.innerHTML = h;
}


// Table

  const table = document.getElementById('structTable');
  const vis = theories.filter(t => activeTheories.has(t.id));
  const activeCaseList = cases.filter(cs => activeCases.has(cs.id));
  const pos = [
    { label: '開場', range: '0–10%', act: 1, s: 0, e: 10 },
    { label: '觸發事件', range: '10–18%', act: 1, s: 10, e: 18 },
    { label: '第一幕結尾', range: '18–27%', act: 1, s: 18, e: 27 },
    { label: '第二幕前半', range: '27–42%', act: 2, s: 27, e: 42 },
    { label: '中間點', range: '42–55%', act: 2, s: 42, e: 55 },
    { label: '第二幕後半', range: '55–67%', act: 2, s: 55, e: 67 },
    { label: '低谷／危機', range: '67–78%', act: 2, s: 67, e: 78 },
    { label: '高潮', range: '78–95%', act: 3, s: 78, e: 95 },
    { label: '收尾', range: '95–100%', act: 3, s: 95, e: 100 }
  ];
  const actC = { 1: 'var(--accent1)', 2: 'var(--accent2)', 3: 'var(--accent3)' };
  const actBg = { 1: 'rgba(255,107,107,0.06)', 2: 'rgba(255,217,61,0.06)', 3: 'rgba(107,203,119,0.06)' };
  const actN = { 1: '一', 2: '二', 3: '三' };
  
  let h = '<thead><tr><th>故事位置</th>';
  vis.forEach(t => { h += `<th style="color:${t.color}">${t.name}</th>`; });
  // Case columns header
  activeCaseList.forEach(cs => {
    caseTheories.forEach(tid => {
      const theory = theories.find(t => t.id === tid);
      if (!theory || !cs.analyses[tid]) return;
      h += `<th style="color:${cs.color};font-size:0.6rem;border-left:2px solid ${cs.color}22">🎬 ${cs.title}<br><span style="font-weight:400;font-size:0.58rem">${theory.name}</span></th>`;
    });
  });
  h += '</tr></thead><tbody>';
  
  pos.forEach(p => {
    const bg = actBg[p.act];
    h += `<tr><td style="background:${bg}"><span class="stage-label" style="background:${bg};color:${actC[p.act]}">第${actN[p.act]}幕</span><br>${p.label}<br><span style="font-size:0.6rem;color:var(--text-dim);font-family:Space Mono">${p.range}</span></td>`;
    vis.forEach(theory => {
      const matching = theory.steps.filter(s => {
        const sm = (s.start + s.end) / 2;
        return (s.start < p.e + 3 && s.end > p.s - 3) || (sm >= p.s - 3 && sm <= p.e + 3);
      });
      if (matching.length > 0) {
        const cell = matching.map(s => `<strong style="color:${theory.color};font-size:0.65rem">${s.name}</strong><br><span style="font-size:0.62rem">${s.desc}</span>`).join('<br>');
        h += `<td style="background:${bg}">${cell}</td>`;
      } else {
        h += `<td style="background:${bg};color:var(--border)">—</td>`;
      }
    });
    // Case columns data
    activeCaseList.forEach(cs => {
      caseTheories.forEach(tid => {
        const steps = cs.analyses[tid];
        if (!steps) return;
        const matching = steps.filter(s => {
          const sm = (s.start + s.end) / 2;
          return (s.start < p.e + 3 && s.end > p.s - 3) || (sm >= p.s - 3 && sm <= p.e + 3);
        });
        if (matching.length > 0) {
          const cell = matching.map(s => `<strong style="color:${cs.color};font-size:0.65rem">${s.name}</strong><br><span style="font-size:0.62rem">${s.desc}</span>`).join('<br>');
          h += `<td style="background:${bg};border-left:2px solid ${cs.color}22">${cell}</td>`;
        } else {
          h += `<td style="background:${bg};border-left:2px solid ${cs.color}22;color:var(--border)">—</td>`;
        }
      });
    });
    h += '</tr>';
  });
  
  h += '</tbody>';
  table.innerHTML = h;
}

// Tooltip
function showTip(e, el, theory, title, desc, pos) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tooltipTheory').textContent = theory || el?.dataset.theory || '';
  document.getElementById('tooltipTitle').textContent = title || el?.dataset.title || '';
  document.getElementById('tooltipDesc').textContent = desc || el?.dataset.desc || '';
  document.getElementById('tooltipPos').textContent = '📍 ' + (pos || el?.dataset.pos || '');
  tt.classList.add('show');
  moveTip(e);
}

function moveTip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 320) + 'px';
  tt.style.top = Math.min(e.clientY - 8, window.innerHeight - 110) + 'px';
}

function hideTip() { document.getElementById('tooltip').classList.remove('show'); }

// View switching
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  event.target.classList.add('active');
  if (view === 'circle') { renderCircleSelector(); renderCircle(); }
}

// Keyboard: Escape closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Touch support for mobile - tap on segments to show tooltip
document.addEventListener('touchstart', function(e) {
  const seg = e.target.closest('.timeline-segment');
  if (seg) {
    e.preventDefault();
    const touch = e.touches[0];
    showTip({clientX: touch.clientX, clientY: touch.clientY}, seg);
    setTimeout(hideTip, 3000);
  }
}, {passive: false});

// Tap anywhere else to dismiss tooltip on mobile
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('.timeline-segment') && !e.target.closest('.tooltip')) {
    hideTip();
  }
});

// Zoom
const ZOOM_STEPS = [80, 90, 100, 110, 120, 135, 150];
let zoomIndex = 2; // default 100%

function changeZoom(dir) {
  zoomIndex = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIndex + dir));
  const pct = ZOOM_STEPS[zoomIndex];
  document.documentElement.style.fontSize = (pct / 100 * 16) + 'px';
  document.getElementById('zoomLevel').textContent = pct + '%';
  // re-render circle since SVG uses absolute font-size
  if (document.getElementById('view-circle').classList.contains('active')) {
    renderCircle();
  }
}

// Init
buildLegend();
buildCaseBar();
renderTimeline();
renderCircleSelector();
renderCircle();
renderTable();
</script>
</body>
</html>
